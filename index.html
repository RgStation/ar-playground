<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Playground</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    .ui {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    .instructions {
        margin-bottom: 10px;
        color: white;
        background: rgba(0, 0, 0, 0.7);
        display: inline-block;
        padding: 14px, 20px;
        border-radius: 12px;
        font-size: 30px;
    }
    .row {
        display: flex;
        justify-content: center;
    }

    button {
      padding: 15px 20px;
      margin: 8px;
      font-size: 30px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
    }

    /* pakotetaan AR nappi ylös */
    button[style*="position: absolute"] {
      top: 10px !important;
      bottom: auto !important;
      left: 10px !important;
      z-index: 20 !important;
    }
  </style>
</head>

<body>

<div class="ui">

    <div class="instructions">
        Select a model first, then choose a color or don't, and click START AR
    </div>
    <div class="row">
        <button id="robotBtn">🤖 Robot</button>
        <button id="appleBtn">🍎 Apple</button>
        <button id="heartBtn">❤️ Heart</button>
    </div>
    <div class="row">
        <button id="greenBtn">💚 Green</button>
        <button id="blueBtn">💙 Blue</button>
        <button id="yellowBtn">💛 Yellow</button>
        <button id="pinkBtn">💖 Pink</button>
    </div>
</div>

<script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
<script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
