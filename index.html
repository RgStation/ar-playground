<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR-playground</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
    }

    .ui {
      position: fixed;
      bottom: 30px;
      width: 100%;
      text-align: center;
      z-index: 1;
    }

    button {
      padding: 15px 20px;
      margin: 8px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
    }

    button.ar-button {
        background: black !important;
        color: white !important;
    }
  </style>
</head>

<body>

<div class="ui">
  <button id="robotBtn">🤖 Robot</button>
  <button id="appleBtn">🍎 Apple</button>
  <button id="heartBtn">❤️ Heart</button>
  <button id="colorBtn">🎨 Green</button>
</div>

<script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
<script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
<script type="module" src="js/main.js"></script>

</body>
</html>
